name: Android and iOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  check:
    name: Release Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      JAVA_VERSION: "17"
      FLUTTER_VERSION: "stable"

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: 安装依赖
        run: make get

      - name: 执行发布前检查
        run: make release-check

  android-release:
    name: Build Android Artifacts
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
    env:
      APP_NAME: "he-music"
      JAVA_VERSION: "17"
      FLUTTER_VERSION: "stable"
      KEYSTORE_PATH: android/keystore/release.jks

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: 校验 Android 签名配置
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          for value_name in ANDROID_KEYSTORE_BASE64 ANDROID_STORE_PASSWORD ANDROID_KEY_PASSWORD ANDROID_KEY_ALIAS; do
            if [ -z "${!value_name}" ]; then
              echo "缺少必需的 GitHub Secret: ${value_name}" >&2
              exit 1
            fi
          done

      - name: 安装依赖
        run: make get

      - name: 恢复 Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/keystore
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "${KEYSTORE_PATH}"

      - name: 生成 Android 签名配置
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${ANDROID_STORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=keystore/release.jks
          EOF

      - name: 构建 Android APK
        run: make build-apk

      - name: 整理 Android 发布文件名
        run: |
          mkdir -p dist/android
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ -n "${GITHUB_REF_NAME}" ]; then
            VERSION_NAME="${GITHUB_REF_NAME}"
          else
            VERSION_NAME="manual-${GITHUB_RUN_NUMBER}"
          fi
          for artifact in build/app/outputs/flutter-apk/app-*-release.apk; do
            ABI_NAME="$(basename "${artifact}" | sed -E 's/^app-(.*)-release\.apk$/\1/')"
            cp "${artifact}" "dist/android/${APP_NAME}-${VERSION_NAME}-android-${ABI_NAME}.apk"
          done

      - name: 上传 Android 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: he-music-android-release
          path: |
            dist/android/*.apk
          if-no-files-found: error

  ios-release:
    name: Build iOS Artifacts
    runs-on: macos-latest
    needs: check
    permissions:
      contents: read
    env:
      APP_NAME: "he-music"
      FLUTTER_VERSION: "stable"

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: 安装依赖
        run: make get

      - name: 执行 iOS 无签名构建脚本
        run: |
          chmod +x scripts/build_ios.sh
          VERSION_NAME="manual-${GITHUB_RUN_NUMBER}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ -n "${GITHUB_REF_NAME}" ]; then
            VERSION_NAME="${GITHUB_REF_NAME}"
          fi
          ./scripts/build_ios.sh "${APP_NAME}-${VERSION_NAME}"

      - name: 存放 iOS 构建产物
        run: |
          mkdir -p dist/ios
          VERSION_NAME="manual-${GITHUB_RUN_NUMBER}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ -n "${GITHUB_REF_NAME}" ]; then
            VERSION_NAME="${GITHUB_REF_NAME}"
          fi
          mv "${APP_NAME}-${VERSION_NAME}.ipa" "dist/ios/${APP_NAME}-${VERSION_NAME}-ios.ipa"

      - name: 上传 iOS 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: he-music-ios-release
          path: |
            dist/ios/*.ipa
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [android-release, ios-release]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        shell: bash
        run: |
          # 获取前一个 tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          echo "Previous tag: $PREV_TAG"
          echo "Current tag: $CURRENT_TAG"

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found. Generating log from start."
            git log --pretty=format:"- %s (%h)" > changelog_content.md
          else
            echo "Generating log from $PREV_TAG to $CURRENT_TAG"
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" > changelog_content.md
          fi

          # 翻译提交类型 (Conventional Commits)
          sed -i -E 's/^- feat(\(.*\))?:/- ✨ 新增:/g' changelog_content.md
          sed -i -E 's/^- fix(\(.*\))?:/- 🐞 修复:/g' changelog_content.md
          sed -i -E 's/^- docs(\(.*\))?:/- 📝 文档:/g' changelog_content.md
          sed -i -E 's/^- style(\(.*\))?:/- 💄 样式:/g' changelog_content.md
          sed -i -E 's/^- refactor(\(.*\))?:/- ♻️ 重构:/g' changelog_content.md
          sed -i -E 's/^- perf(\(.*\))?:/- ⚡️ 性能:/g' changelog_content.md
          sed -i -E 's/^- test(\(.*\))?:/- ✅ 测试:/g' changelog_content.md
          sed -i -E 's/^- build(\(.*\))?:/- 📦 构建:/g' changelog_content.md
          sed -i -E 's/^- ci(\(.*\))?:/- 👷 CI:/g' changelog_content.md
          sed -i -E 's/^- chore(\(.*\))?:/- 🔧 维护:/g' changelog_content.md
          sed -i -E 's/^- revert(\(.*\))?:/- ⏪️ 回退:/g' changelog_content.md

          # 1. 生成 CHANGELOG.md 的新条目
          # 添加标题和日期
          DATE=$(date +%Y-%m-%d)
          echo -e "\n## [$CURRENT_TAG] - $DATE\n" > temp_header.md
          cat temp_header.md changelog_content.md > new_entry.md

          # 更新 CHANGELOG.md
          if [ ! -f CHANGELOG.md ]; then
            echo "# 更新日志" > CHANGELOG.md
          fi

          # 将新内容插入到 CHANGELOG.md 的第二行（标题之后）
          head -n 1 CHANGELOG.md > temp_changelog.md
          echo "" >> temp_changelog.md
          cat new_entry.md >> temp_changelog.md
          echo "" >> temp_changelog.md
          tail -n +2 CHANGELOG.md >> temp_changelog.md
          mv temp_changelog.md CHANGELOG.md

          # 2. 生成 Release Body (release_notes.md)
          cat changelog_content.md > release_notes.md

          # 输出生成的日志内容供 Release 使用
          cat release_notes.md
      - name: 下载 Android 构建产物
        uses: actions/download-artifact@v4
        with:
          name: he-music-android-release
          path: artifacts/android

      - name: 下载 iOS 构建产物
        uses: actions/download-artifact@v4
        with:
          name: he-music-ios-release
          path: artifacts/ios

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body_path: release_notes.md
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            artifacts/android/**/*.apk
            artifacts/ios/**/*.ipa
